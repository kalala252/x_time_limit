<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>X blocked</title>
    <style>
      :root {
        color-scheme: light;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
        background: linear-gradient(180deg, #f7f7f9 0%, #ececf1 100%);
        color: #222;
      }

      main {
        width: min(560px, calc(100% - 2rem));
        background: #fff;
        border: 1px solid #ddd;
        border-radius: 14px;
        padding: 1.5rem;
        box-shadow: 0 8px 22px rgba(0, 0, 0, 0.08);
      }

      h1 {
        margin: 0 0 0.8rem;
        font-size: 1.35rem;
      }

      p {
        margin: 0;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>X への直接アクセスをブロックしました</h1>
      <p>
        この拡張機能の設定により、x.com / twitter.com を直接開く操作は無効化されています。
      </p>
      <p>
        他サイト上の埋め込み（引用表示）は引き続き表示されます。
      </p>
    </main>
  </body>
</html>
